<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>퀴즈 대시보드</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #ecf0f1; padding: 40px; text-align: center; }
        .buzzer-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; flex-wrap: wrap; }
        .lamp {
            width: 100px; height: 100px; border-radius: 15px; background-color: #bdc3c7;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-weight: bold; border: 4px solid #95a5a6; transition: 0.3s;
        }
        .lamp.on { 
            background-color: #e74c3c; /* 메인 레드 */
            border-color: #c0392b;     /* 진한 레드 (테두리) */
            box-shadow: 0 0 20px #e74c3c; /* 붉은 광채 */
        }
        
        .order-list {
            max-width: 500px; margin: 0 auto; background: white; padding: 20px;
            border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .order-item { font-size: 1.5rem; padding: 10px; border-bottom: 1px solid #eee; }
        .order-item:last-child { border-bottom: none; }
        .order-item span { color: #e74c3c; font-weight: bold; }
        
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; background: #34495e; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Quiz Dashboard</h1>
    
    <div class="buzzer-container" id="lampContainer">
        <!-- 7개의 버저 램프 생성 -->
    </div>

    <div class="order-list">
        <h3>눌린 순서</h3>
        <div id="orderDisplay">기다리는 중...</div>
        <button onclick="resetAll()">리셋</button>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io.connect('http://localhost:3001', {
            path: '/socket.io',
            transports: ['websocket']
        });
        socket.on("connect", () => {
            console.log("대시보드 활성화됨");
        });
        const lampContainer = document.getElementById('lampContainer');
        const orderDisplay = document.getElementById('orderDisplay');
        let pressedOrder = [];

        // 1. 7개의 램프 생성
        for (let i = 1; i <= 7; i++) {
            const lamp = document.createElement('div');
            lamp.className = 'lamp';
            lamp.id = `lamp-${i}`;
            lamp.innerHTML = `<span>${i}번</span>`;
            // 테스트용: 클릭 시 불이 들어오게 설정
            lamp.onclick = () => pressBuzzer(i);
            lampContainer.appendChild(lamp);
        }

        // 2. 버저 클릭 함수 (실제로는 서버 신호를 받아 실행됨)
        function pressBuzzer(num) {
            if (pressedOrder.includes(num)) return; // 이미 눌렸으면 무시

            pressedOrder.push(num);
            document.getElementById(`lamp-${num}`).classList.add('on');
            updateDisplay();
        }

        // 3. 순서 표시 업데이트
        function updateDisplay() {
            if (pressedOrder.length === 0) {
                orderDisplay.innerText = "기다리는 중...";
                return;
            }
            orderDisplay.innerHTML = pressedOrder
                .map((num, index) => `<div class="order-item"><span>${index + 1}위:</span> ${num}번 사용자</div>`)
                .join('');
        }

        // 4. 초기화
        function resetAll() {
            pressedOrder = [];
            document.querySelectorAll('.lamp').forEach(l => l.classList.remove('on'));
            updateDisplay();
        }

        socket.on('dashboard', (data) => {
            pressBuzzer(Number(data));
        });
    </script>
</body>
</html>
